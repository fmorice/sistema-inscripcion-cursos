spring:
  datasource:
    url: jdbc:h2:mem:guiasdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

aws:
  region: us-east-1
  s3:
    bucket: sistema-gestion-guias-flore-2026

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework: INFO
    software.amazon.awssdk: INFO
